<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, user-scalable=yes">
  <title>View</title>
  <link rel="apple-touch-icon" sizes="1024x1024" href="./icon.png">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    .main {
      flex: 1;
    }

    .card {
      background: white;
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
      align-items: center;
      min-height: 480px;
      box-sizing: border-box;
    }

    #title {
      text-align: center;
      font-size: 25px;
      margin-bottom: 10px;
    }

    .detail-info {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .detail-info a {
      color: #191970;
      text-decoration: underline;
    }

    #description {
      text-align: left;
      font-size: 14px;
      color: #333;
      background: #f9faff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }

    #btn3 {
      display: flex;
      align-items: center;
      text-align: center;
    }

    a.btn {
      background: white;
      color: #191970;
      padding: 6px 12px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      border: 1px solid #191970;
      width: 100%;
      margin-left: 5px;
      margin-right: 5px;
      margin-bottom: 10px;
    }

    .word {
      border-bottom: 1px solid #ddd;
      padding: 6px 0;
    }
  </style>
</head>

<body>

  <header>
    <p class="headertitle"><a href="index.html">単語帳(名前募集中)</a></p>
    <div id="status" style="display:none">ログイン確認中...</div>
    <div>
      <button id="mypageBtn" class="header-btn" style="display:none"
        onclick="window.goPage('mypage.html')">マイページ</button>
      <button id="loginBtn" class="header-btn" onclick="location.href='login.html'">ログイン</button>
      <button id="logoutBtn" class="header-btn" style="display:none" onclick="window.logout()">ログアウト</button>
    </div>
  </header>
  <div class="main">
    <div class="card">
      <h2 id="title"></h2>
      <div id="detailInfo" class="detail-info"></div>
      <div id="description" style="display:none"></div>
      <div id="btn3">
        <a class="btn" id="editBtn" style="display:none">編集</a>
        <a class="btn" id="flashBtn">暗記</a>
        <a class="btn" id="testBtn">テスト</a>
      </div>
      <div id="words"></div>
    </div>
  </div>
  <footer>
    <div class="footer-inner">
      <div>単語帳<a href="./newname.html" class="footernewname">(名前募集中)</a></div>
      <div class="footer-links">
        <a href="index.html">ホーム</a>
        <a href="list.html">公開単語帳</a>
        <a href="create.html">作成</a>
        <a href="mypage.html">マイページ</a>
        <a href="update.html">更新履歴</a>
        <a href="contact.html">お問い合わせ</a>
      </div>
      <div class="copy">© 2026 TEAM-Minimal, Shiratae</div>
    </div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyD7CJmO3eAO0o2EPRDsVqTtZ_whRd_3-3E", authDomain: "quiz1-4ffdc.firebaseapp.com", projectId: "quiz1-4ffdc", storageBucket: "quiz1-4ffdc.firebasestorage.app", messagingSenderId: "152062126332", appId: "1:152062126332:web:845af237a1a76207214f79" };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const id = new URLSearchParams(location.search).get("id");
    let owner;
    let currentUser = null;

    const statusDiv = document.getElementById("status");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const mypageBtn = document.getElementById("mypageBtn");

    window.goPage = (page) => {
      if (page === "index.html") {
        location.href = "index.html";
        return;
      }
      if (currentUser) {
        location.href = page;
      } else {
        alert("ログインしてください");
        location.href = "login.html";
      }
    };

    window.logout = () => {
      auth.signOut();
    };

    const bookSnap = await getDoc(doc(db, "wordbooks", id));
    if (!bookSnap.exists()) {
      alert("単語帳が見つかりません");
      location.href = "index.html";
    }
    const book = bookSnap.data();
    owner = book.owner;
    document.getElementById("title").textContent = book.title;

    // 詳細情報の表示
    const details = [];
    if (book.ownerName) details.push(`作成者: <a href="user.html?id=${owner}">${book.ownerName}</a>`);

    // 日時のフォーマット (YYYY/MM/DD)
    const updateDate = book.updatedAt ? book.updatedAt.toDate() : (book.createdAt ? book.createdAt.toDate() : null);
    if (updateDate) {
      const y = updateDate.getFullYear();
      const m = updateDate.getMonth() + 1;
      const d = updateDate.getDate();
      details.push(`最終更新: ${y}/${m}/${d}`);
    }

    // 単語数
    if (book.wordCount !== undefined) {
      details.push(`計 ${book.wordCount} 単語`);
    }

    document.getElementById("detailInfo").innerHTML = details.join(" | ");

    // 説明文の表示
    if (book.description) {
      const descDiv = document.getElementById("description");
      descDiv.textContent = book.description;
      descDiv.style.display = "block";
    }

    const wordsDiv = document.getElementById("words");
    const wSnap = await getDocs(collection(db, "wordbooks", id, "words"));
    wSnap.forEach(d => {
      wordsDiv.innerHTML += `<div class="word">${d.data().front} - ${d.data().back}</div>`;
    });

    document.getElementById("flashBtn").href = `flash.html?id=${id}`;
    document.getElementById("testBtn").href = `test.html?id=${id}`;

    onAuthStateChanged(auth, user => {
      currentUser = user;
      if (user) {
        statusDiv.textContent = "ログイン中: " + user.uid;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
        mypageBtn.style.display = "inline-block";

        if (user.uid === owner) {
          const editBtn = document.getElementById("editBtn");
          editBtn.style.display = "inline";
          editBtn.href = `edit.html?id=${id}`;
        }
      } else {
        statusDiv.textContent = "ログアウト中";
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
        mypageBtn.style.display = "none";
      }
    });
  </script>
</body>

</html>
